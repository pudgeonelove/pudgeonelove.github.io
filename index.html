<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyAcademy | Cyber Learning Protocol 2.0</title>
    <style>
        /* ==========================================================================
           1. ПЕРЕМЕННЫЕ И ОСНОВЫ (ROOT & RESET)
           ========================================================================= */
        :root {
            --bg-deep: #050505;
            --bg-card: #0d0d0d;
            --voltage-yellow: #ffe066;
            --voltage-yellow-glow: rgba(255, 224, 102, 0.4);
            --nitro-blue: #00f2ff;
            --matrix-green: #00ff66;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }

        /* ==========================================================================
           2. ФОНОВЫЕ ЭФФЕКТЫ
           ========================================================================= */
        #nitro-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 1) 0%, rgba(5, 5, 5, 1) 100%),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 2px);
            background-size: 100% 100%, 100% 4px;
            z-index: -1;
        }

        /* ==========================================================================
           3. SIDEBAR (НАВИГАЦИЯ)
           ========================================================================= */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width);
            background: #080808; border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; z-index: 100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }

        .sidebar-header { padding: 30px 25px; border-bottom: 1px solid #151515; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--voltage-yellow); }

        .tab-switcher { display: flex; padding: 20px; gap: 10px; }
        .tab-btn {
            flex: 1; padding: 10px; border: 1px solid #222; background: transparent;
            color: var(--text-muted); cursor: pointer; border-radius: 8px; font-size: 11px;
            text-transform: uppercase; font-weight: 700; transition: 0.3s;
        }
        .tab-btn.active { background: #111; border-color: var(--voltage-yellow); color: #fff; }

        .progress-container { padding: 10px 25px 25px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
        .bar-bg { height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--voltage-yellow); width: 0%; transition: width 0.8s ease; }

        .nav-list { flex: 1; overflow-y: auto; padding: 10px 15px; }
        .nav-item {
            width: 100%; display: flex; align-items: center; padding: 12px 15px;
            background: transparent; border: none; color: #666; cursor: pointer;
            border-radius: 12px; margin-bottom: 5px; transition: 0.2s; text-align: left;
        }
        .nav-item:hover { background: #111; color: #fff; }
        .nav-item.active { background: #111; color: var(--voltage-yellow); }
        .nav-item.done .nav-check { color: var(--matrix-green); opacity: 1; }
        .nav-num { font-size: 10px; margin-right: 15px; opacity: 0.5; font-family: monospace; }
        .nav-name { flex: 1; font-size: 13px; font-weight: 500; }
        .nav-check { opacity: 0; font-size: 12px; }

        /* ==========================================================================
           4. MAIN CONTENT & IDE
           ========================================================================= */
        .main-content { margin-left: var(--sidebar-width); min-height: 100vh; position: relative; }
        @media (max-width: 900px) { .main-content { margin-left: 0; } }

        .content-header {
            position: sticky; top: 0; background: rgba(5,5,5,0.8);
            backdrop-filter: blur(12px); padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #151515; z-index: 50;
        }

        .view-section { display: none; padding: 40px; max-width: 1100px; margin: 0 auto; }
        .view-section.active { display: block; }

        .ide-widget {
            background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 16px;
            margin: 30px 0; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .ide-header { background: #111; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .ide-file-info { font-family: monospace; font-size: 12px; color: var(--text-muted); }
        
        .run-btn {
            background: var(--voltage-yellow); color: #000; border: none;
            padding: 8px 18px; border-radius: 8px; font-size: 12px; font-weight: 900;
            cursor: pointer; transition: 0.3s;
        }
        .run-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--voltage-yellow-glow); }
        
        .ide-body { padding: 25px; font-family: 'Consolas', 'Fira Code', monospace; font-size: 15px; color: #cfcfcf; }
        .ide-terminal { background: #000; padding: 18px 25px; border-top: 1px solid #1a1a1a; display: none; }
        .ide-terminal.active { display: block; }
        .term-head { font-size: 10px; text-transform: uppercase; color: #555; margin-bottom: 8px; }
        .term-prefix { color: var(--matrix-green); margin-right: 10px; }

        /* ==========================================================================
           5. VIDEO CARDS & TOASTS
           ========================================================================= */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .video-card {
            background: var(--bg-card); border: 1px solid #1a1a1a; padding: 30px;
            border-radius: 24px; transition: 0.3s;
        }
        .video-card:hover { border-color: var(--nitro-blue); transform: translateY(-5px); background: #111; }
        .v-icon { color: var(--nitro-blue); margin-bottom: 15px; }
        .v-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
        .v-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; min-height: 40px; }
        .v-btn-watch {
            background: #fff; color: #000; border: none; padding: 14px;
            width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .v-btn-watch:hover { background: var(--nitro-blue); box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }

        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .toast {
            background: #0d0d0d; border: 1px solid #222; border-left: 4px solid var(--matrix-green);
            padding: 18px 28px; border-radius: 12px; color: #fff; font-size: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-top: 10px; animation: slideIn 0.4s ease;
        }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        /* ==========================================================================
           6. MODAL & UTILS
           ========================================================================= */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 300; display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .overlay.active { display: flex; }
        .cyber-modal {
            background: var(--bg-card); border: 1px solid var(--voltage-yellow);
            border-radius: 24px; padding: 50px; max-width: 500px; width: 100%; text-align: center;
        }
        .modal-btn {
            background: #fff; color: #000; border: none; width: 100%; padding: 18px;
            border-radius: 14px; font-weight: 900; cursor: pointer; margin-top: 30px; font-size: 16px;
        }

        #mobile-nav-toggle, #mobile-close { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; display: none; }
        @media (max-width: 900px) { #mobile-nav-toggle, #mobile-close { display: block; } }

        .neon-text { text-shadow: 0 0 15px var(--voltage-yellow-glow); color: #fff; }
        .next-lesson-btn {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            padding: 16px 35px; border-radius: 14px; cursor: pointer; font-weight: 800; transition: 0.3s;
        }
        .next-lesson-btn:hover { border-color: var(--voltage-yellow); color: var(--voltage-yellow); transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="nitro-bg"></div>
    <div id="toast-container"></div>

    <div id="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="logo">🐍 <span>Py</span>Academy</div>
                    <button id="mobile-close" onclick="toggleMobileNav()">×</button>
                </div>
            </div>
            
            <div class="tab-switcher">
                <button class="tab-btn active" onclick="switchMainTab('course', this)">Курс</button>
                <button class="tab-btn" onclick="switchMainTab('videos', this)">Видео</button>
            </div>

            <div class="progress-container">
                <div class="progress-info"><span>ПРОТОКОЛ ОБУЧЕНИЯ</span> <span id="p-val">0%</span></div>
                <div class="bar-bg"><div class="bar-fill" id="p-fill"></div></div>
            </div>

            <nav class="nav-list" id="nav-list"></nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div style="display:flex; align-items:center; gap:20px;">
                    <button id="mobile-nav-toggle" onclick="toggleMobileNav()">☰</button>
                    <h4 id="head-title" style="color:var(--text-muted); font-weight:500;">Подключение...</h4>
                </div>
                <div style="font-size: 10px; color: var(--matrix-green); font-weight: 900; letter-spacing: 2px;">
                    SYSTEM ACTIVE <span id="clock" style="color:#fff; margin-left:10px;">00:00</span>
                </div>
            </header>

            <section id="view-course" class="view-section active">
                <div id="lesson-content-area"></div>
            </section>

            <section id="view-videos" class="view-section">
                <h1 class="neon-text" style="font-size: 36px; margin-bottom: 10px;">Медиа-Хаб</h1>
                <p style="color:var(--text-muted); margin-bottom: 40px;">Видео-инструкции для продвинутого кодинга.</p>
                <div class="video-grid" id="video-grid-container"></div>
            </section>
        </main>
    </div>

    <div class="overlay" id="finish-overlay">
        <div class="cyber-modal">
            <h1 style="color: var(--voltage-yellow); margin-bottom: 20px;">СИСТЕМА СИНХРОНИЗИРОВАНА</h1>
            <p>Вы завершили 20 модулей Python Academy. Ваш мозг теперь понимает код. Готовы к созданию своего проекта?</p>
            <button class="modal-btn" onclick="resetCourse()">СБРОСИТЬ И ПОВТОРИТЬ</button>
        </div>
    </div>

    <script>
        /* ==========================================================================
           7. ДАННЫЕ И ЛОГИКА (JS)
           ========================================================================= */

        const HARDCODED_VIDEOS = [
            { title: "Python: Полный гайд", desc: "Все основы языка в одном видео для закрепления материала.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Настройка VS Code", desc: "Как сделать редактор красивым и удобным для работы.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Telegram Боты", desc: "Пишем первого бота на aiogram с нуля.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Основы Парсинга", desc: "Как собирать данные с сайтов автоматически.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Нейросети на Python", desc: "Введение в мир AI и библиотеки TensorFlow/PyTorch.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Деплой Проектов", desc: "Как запустить свой сайт или бота на сервере 24/7.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" }
        ];

        const lessons = [
            { id: 1, title: "Функция Print", subtitle: "Вывод информации", code: "print('Hello, Academy!')\n# Это твоя первая команда", out: "Hello, Academy!" },
            { id: 2, title: "Переменные", subtitle: "Хранение данных", code: "name = 'Neo'\nprint(f'Привет, {name}')", out: "Привет, Neo" },
            { id: 3, title: "Типы данных", subtitle: "Строки и Числа", code: "x = 10\ny = 2.5\nprint(type(x))\nprint(type(y))", out: "<class 'int'>\n<class 'float'>" },
            { id: 4, title: "Арифметика", subtitle: "Математика в коде", code: "a = 15\nb = 4\nprint(f'Остаток: {a % b}')", out: "Остаток: 3" },
            { id: 5, title: "Условия IF", subtitle: "Логические тесты", code: "score = 85\nif score > 80:\n    print('Зачет!')", out: "Зачет!" },
            { id: 6, title: "Else и Elif", subtitle: "Ветвление логики", code: "age = 15\nif age >= 18:\n    print('Взрослый')\nelse:\n    print('Студент')", out: "Студент" },
            { id: 7, title: "Списки (Lists)", subtitle: "Коллекции данных", code: "tools = ['Python', 'AI', 'Git']\nprint(tools[0])", out: "Python" },
            { id: 8, title: "Методы списков", subtitle: "Управление данными", code: "items = [1, 2]\nitems.append(3)\nprint(items)", out: "[1, 2, 3]" },
            { id: 9, title: "Цикл For", subtitle: "Перебор элементов", code: "for i in range(3):\n    print(f'Шаг: {i}')", out: "Шаг: 0\nШаг: 1\nШаг: 2" },
            { id: 10, title: "Цикл While", subtitle: "Условные циклы", code: "x = 3\nwhile x > 0:\n    print(x)\n    x -= 1", out: "3\n2\n1" },
            { id: 11, title: "Функции def", subtitle: "Многоразовый код", code: "def greet():\n    return 'System Online'\nprint(greet())", out: "System Online" },
            { id: 12, title: "Аргументы", subtitle: "Передача данных", code: "def add(a, b):\n    return a + b\nprint(add(5, 5))", out: "10" },
            { id: 13, title: "Словари (Dict)", subtitle: "Ключ и значение", code: "user = {'id': 1, 'lvl': 99}\nprint(user['lvl'])", out: "99" },
            { id: 14, title: "F-строки", subtitle: "Продвинутый вывод", code: "v = 3.12\nprint(f'Python version: {v}')", out: "Python version: 3.12" },
            { id: 15, title: "Длина len()", subtitle: "Подсчет элементов", code: "txt = 'Cyber'\nprint(len(txt))", out: "5" },
            { id: 16, title: "Срезы (Slicing)", subtitle: "Части строк/списков", code: "s = 'Academy'\nprint(s[0:4])", out: "Acad" },
            { id: 17, title: "Ошибки Try/Except", subtitle: "Обработка сбоев", code: "try:\n    1 / 0\nexcept:\n    print('Ошибка деления')", out: "Ошибка деления" },
            { id: 18, title: "Модуль Random", subtitle: "Случайные числа", code: "import random\n# Генерируем 1 или 2\nprint(random.randint(1,2))", out: "1 (или 2)" },
            { id: 19, title: "Работа с JSON", subtitle: "Формат данных", code: "import json\ndata = '{\"status\": 200}'\nprint(json.loads(data))", out: "{'status': 200}" },
            { id: 20, title: "Финальный тест", subtitle: "Мастер Python", code: "print('Курс завершен успешно!')", out: "Курс завершен успешно!" }
        ];

        let state = {
            currentLesson: 1,
            completed: JSON.parse(localStorage.getItem('py_completed')) || []
        };

        function init() {
            renderNav();
            renderVideos();
            loadLesson(state.currentLesson);
            updateProgress();
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            }, 1000);
        }

        function renderNav() {
            const nav = document.getElementById('nav-list');
            nav.innerHTML = lessons.map(l => `
                <button class="nav-item ${state.currentLesson === l.id ? 'active' : ''} ${state.completed.includes(l.id) ? 'done' : ''}" 
                        id="ni-${l.id}" onclick="loadLesson(${l.id})">
                    <span class="nav-num">${l.id.toString().padStart(2, '0')}</span>
                    <span class="nav-name">${l.title}</span>
                    <span class="nav-check">✔</span>
                </button>
            `).join('');
        }

        function loadLesson(id) {
            state.currentLesson = id;
            const lesson = lessons.find(l => l.id === id);
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const activeNav = document.getElementById(`ni-${id}`);
            if(activeNav) activeNav.classList.add('active');
            
            document.getElementById('head-title').innerText = `МОДУЛЬ: ${lesson.title}`;
            document.getElementById('lesson-content-area').innerHTML = `
                <h1 class="neon-text" style="font-size:32px;">${lesson.title}</h1>
                <p style="color:var(--nitro-blue); margin-bottom:25px; font-weight:700;">// ${lesson.subtitle}</p>
                <div class="ide-widget">
                    <div class="ide-header">
                        <div class="ide-file-info">module_${id}.py</div>
                        <button class="run-btn" onclick="runSimulation(${id}, this)">ЗАПУСТИТЬ</button>
                    </div>
                    <div class="ide-body"><pre><code>${lesson.code}</code></pre></div>
                    <div class="ide-terminal" id="term-${id}">
                        <div class="term-head">OUTPUT</div>
                        <div class="term-line"><span class="term-prefix">>>></span> <span id="out-${id}">Система готова...</span></div>
                    </div>
                </div>
                <button class="next-lesson-btn" onclick="completeStep(${id})">
                    ${id === lessons.length ? 'ЗАВЕРШИТЬ ПРОТОКОЛ' : 'СЛЕДУЮЩИЙ ШАГ →'}
                </button>
            `;
            if(window.innerWidth < 900) toggleMobileNav();
        }

        function runSimulation(id, btn) {
            btn.innerText = "ВЫПОЛНЕНИЕ...";
            const out = document.getElementById(`out-${id}`);
            const term = document.getElementById(`term-${id}`);
            setTimeout(() => {
                term.classList.add('active');
                out.innerText = lessons.find(l => l.id === id).out;
                out.style.color = "var(--matrix-green)";
                btn.innerText = "УСПЕХ";
                showToast(`Модуль ${id} скомпилирован`);
            }, 700);
        }

        function completeStep(id) {
            if(!state.completed.includes(id)) {
                state.completed.push(id);
                localStorage.setItem('py_completed', JSON.stringify(state.completed));
                document.getElementById(`ni-${id}`).classList.add('done');
            }
            updateProgress();
            if(id < lessons.length) {
                loadLesson(id + 1);
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else {
                document.getElementById('finish-overlay').classList.add('active');
            }
        }

        function updateProgress() {
            const percent = Math.round((state.completed.length / lessons.length) * 100);
            document.getElementById('p-fill').style.width = percent + '%';
            document.getElementById('p-val').innerText = percent + '%';
        }

        function renderVideos() {
            const container = document.getElementById('video-grid-container');
            container.innerHTML = HARDCODED_VIDEOS.map((v) => `
                <div class="video-card">
                    <div class="v-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                        </svg>
                    </div>
                    <div class="v-title">${v.title}</div>
                    <div class="v-desc">${v.desc}</div>
                    <button class="v-btn-watch" onclick="window.open('${v.url}', '_blank')">СМОТРЕТЬ</button>
                </div>
            `).join('');
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateX(50px)';
                setTimeout(() => t.remove(), 400);
            }, 2500);
        }

        window.toggleMobileNav = () => document.getElementById('sidebar').classList.toggle('active');

        window.switchMainTab = (view, btn) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            if(view === 'videos') document.getElementById('head-title').innerText = "МЕДИАТЕКА";
            else loadLesson(state.currentLesson);
        };

        window.resetCourse = () => {
            if(confirm("Сбросить весь прогресс?")) {
                localStorage.removeItem('py_completed');
                location.reload();
            }
        };

        init();
    </script>
</body>
</html>
