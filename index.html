<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyAcademy | Cyber Learning Protocol 3.0</title>
    <style>
        /* ==========================================================================
           1. СТИЛИ (БЕЗ ИЗМЕНЕНИЙ В ДИЗАЙНЕ)
           ========================================================================= */
        :root {
            --bg-deep: #050505; --bg-card: #0d0d0d; --voltage-yellow: #ffe066;
            --voltage-yellow-glow: rgba(255, 224, 102, 0.4); --nitro-blue: #00f2ff;
            --matrix-green: #00ff66; --text-main: #e0e0e0; --text-muted: #888;
            --sidebar-width: 280px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        #nitro-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #141414 0%, #050505 100%); z-index: -1; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width);
            background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; z-index: 100;
            transition: transform 0.4s ease;
        }
        @media (max-width: 900px) { .sidebar { transform: translateX(-100%); } .sidebar.active { transform: translateX(0); } }
        .sidebar-header { padding: 30px 25px; border-bottom: 1px solid #151515; }
        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: var(--voltage-yellow); }
        .tab-switcher { display: flex; padding: 20px; gap: 10px; }
        .tab-btn { flex: 1; padding: 10px; border: 1px solid #222; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .tab-btn.active { background: #111; border-color: var(--voltage-yellow); color: #fff; }

        /* PROGRESS */
        .progress-container { padding: 10px 25px 25px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
        .bar-bg { height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--voltage-yellow); width: 0%; transition: 0.8s; }

        .nav-list { flex: 1; overflow-y: auto; padding: 10px 15px; }
        .nav-item { width: 100%; display: flex; align-items: center; padding: 12px 15px; background: transparent; border: none; color: #666; cursor: pointer; border-radius: 12px; margin-bottom: 5px; text-align: left; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #111; color: var(--voltage-yellow); }
        .nav-item.done .nav-check { color: var(--matrix-green); opacity: 1; }
        .nav-num { font-size: 10px; margin-right: 15px; opacity: 0.5; }
        .nav-name { flex: 1; font-size: 13px; font-weight: 500; }
        .nav-check { opacity: 0; }

        /* CONTENT */
        .main-content { margin-left: var(--sidebar-width); min-height: 100vh; position: relative; }
        @media (max-width: 900px) { .main-content { margin-left: 0; } }
        .content-header { position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(12px); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #151515; z-index: 50; }
        .view-section { display: none; padding: 40px; max-width: 1000px; margin: 0 auto; }
        .view-section.active { display: block; }

        .lesson-text { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border-left: 3px solid var(--nitro-blue); margin-bottom: 25px; font-size: 15px; color: #bbb; }

        /* IDE */
        .ide-widget { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 16px; margin: 20px 0; overflow: hidden; }
        .ide-header { background: #111; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .run-btn { background: var(--voltage-yellow); color: #000; border: none; padding: 8px 18px; border-radius: 8px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .ide-body { padding: 25px; font-family: 'Consolas', monospace; font-size: 15px; color: #cfcfcf; white-space: pre-wrap; }
        .ide-terminal { background: #000; padding: 18px 25px; border-top: 1px solid #1a1a1a; display: none; }
        .ide-terminal.active { display: block; }
        .term-prefix { color: var(--matrix-green); margin-right: 10px; }

        /* VIDEO */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .video-card { background: var(--bg-card); border: 1px solid #1a1a1a; padding: 25px; border-radius: 24px; transition: 0.3s; }
        .v-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
        .v-btn-watch { background: #fff; color: #000; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 15px; }

        /* UTILS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 300; }
        .overlay.active { display: flex; }
        .cyber-modal { background: #0d0d0d; border: 1px solid var(--voltage-yellow); border-radius: 24px; padding: 50px; text-align: center; max-width: 500px; }
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .toast { background: #111; border-left: 4px solid var(--matrix-green); padding: 15px 25px; border-radius: 8px; margin-top: 10px; animation: slide 0.3s ease; }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .next-lesson-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: 800; }
        #mobile-nav-toggle { background: none; border: none; color: #fff; font-size: 24px; display: none; }
        @media (max-width: 900px) { #mobile-nav-toggle { display: block; } }
    </style>
</head>
<body>

    <div id="nitro-bg"></div>
    <div id="toast-container"></div>

    <div id="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="logo">🐍 <span>Py</span>Academy</div>
                    <button onclick="toggleMobileNav()" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;">×</button>
                </div>
            </div>
            <div class="tab-switcher">
                <button class="tab-btn active" onclick="switchMainTab('course', this)">Курс</button>
                <button class="tab-btn" onclick="switchMainTab('videos', this)">Видео</button>
            </div>
            <div class="progress-container">
                <div class="progress-info"><span>ПРОГРЕСС</span> <span id="p-val">0%</span></div>
                <div class="bar-bg"><div class="bar-fill" id="p-fill"></div></div>
            </div>
            <nav class="nav-list" id="nav-list"></nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <button id="mobile-nav-toggle" onclick="toggleMobileNav()">☰</button>
                <h4 id="head-title">Инициализация системы...</h4>
                <div style="font-size: 10px; color: var(--matrix-green);">v3.0.4 ONLINE</div>
            </header>

            <section id="view-course" class="view-section active">
                <div id="lesson-content-area"></div>
            </section>

            <section id="view-videos" class="view-section">
                <h1>Медиатека</h1>
                <div class="video-grid" id="video-grid-container"></div>
            </section>
        </main>
    </div>

    <div class="overlay" id="finish-overlay">
        <div class="cyber-modal">
            <h1 style="color:var(--voltage-yellow)">КУРС ЗАВЕРШЕН</h1>
            <p>Вы прошли 30 модулей и освоили базу Python!</p>
            <button class="next-lesson-btn" onclick="resetCourse()" style="margin-top:20px; width:100%">НАЧАТЬ ЗАНОВО</button>
        </div>
    </div>

    <script>
        const HARDCODED_VIDEOS = [
            { title: "Основы Python", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Переменные и Типы", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Циклы и Списки", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" }
        ];

        const lessons = [
            { 
                id: 1, title: "Функция Print", subtitle: "Первый контакт", 
                desc: "Функция print() — это база. Она выводит текст или данные на экран консоли. Без неё мы бы не знали, что происходит внутри нашей программы. Текст всегда пишется в кавычках.",
                code: "print('Система запущена')\nprint('Добро пожаловать в PyAcademy!')", out: "Система запущена\nДобро пожаловать в PyAcademy!" 
            },
            { 
                id: 2, title: "Переменные", subtitle: "Ячейки памяти", 
                desc: "Переменная — это как коробка с именем, в которую можно положить данные. Чтобы создать переменную, просто придумай имя, поставь знак '=' и укажи значение.",
                code: "hero = 'Heavy'\nlevel = 15\nprint(f'Игрок: {hero}, Уровень: {level}')", out: "Игрок: Heavy, Уровень: 15" 
            },
            { 
                id: 3, title: "Типы данных", subtitle: "Строки и Числа", 
                desc: "В Python есть разные типы: str (текст), int (целые числа), float (дробные). Функция type() помогает узнать, что именно лежит в переменной.",
                code: "name = 'Medic'\nscore = 99.5\nprint(type(name))\nprint(type(score))", out: "<class 'str'>\n<class 'float'>" 
            },
            { 
                id: 4, title: "Математика", subtitle: "Операторы", 
                desc: "Python умеет считать. Кроме обычных +, -, *, / есть еще % (остаток от деления) и ** (возведение в степень).",
                code: "a = 10\nb = 3\nprint(f'Степень: {a ** b}')\nprint(f'Остаток: {a % b}')", out: "Степень: 1000\nОстаток: 1" 
            },
            { 
                id: 5, title: "Условия if", subtitle: "Логика", 
                desc: "Инструкция if проверяет, верно ли утверждение. Если да — выполняется код под ней. Важно: после if ставится двоеточие, а код пишется с отступом (4 пробела).",
                code: "hp = 20\nif hp < 30:\n    print('Критическое состояние!')", out: "Критическое состояние!" 
            },
            { 
                id: 6, title: "Ветвление else", subtitle: "Альтернатива", 
                desc: "Если условие if ложно, сработает блок else. Это позволяет программе выбирать один из двух путей развития событий.",
                code: "is_admin = False\nif is_admin:\n    print('Доступ разрешен')\nelse:\n    print('В доступе отказано')", out: "В доступе отказано" 
            },
            { 
                id: 7, title: "Условие elif", subtitle: "Множественный выбор", 
                desc: "Когда нужно проверить несколько вариантов, используй elif. Это сокращение от 'else if'.",
                code: "rank = 2\nif rank == 1:\n    print('Золото')\nelif rank == 2:\n    print('Серебро')\nelse:\n    print('Бронза')", out: "Серебро" 
            },
            { 
                id: 8, title: "Логические И/ИЛИ", subtitle: "and, or, not", 
                desc: "Оператор 'and' требует, чтобы оба условия были верны. Оператор 'or' сработает, если верно хотя бы одно из них.",
                code: "has_key = True\nhas_energy = False\nif has_key or has_energy:\n    print('Дверь открыта')", out: "Дверь открыта" 
            },
            { 
                id: 9, title: "Списки (Lists)", subtitle: "Массивы", 
                desc: "Список позволяет хранить много данных в одной переменной. Элементы пишутся в квадратных скобках через запятую. Отсчет начинается с нуля!",
                code: "inventory = ['Gun', 'Knife', 'Armor']\nprint(inventory[0])\nprint(inventory[2])", out: "Gun\nArmor" 
            },
            { 
                id: 10, title: "Изменение списков", subtitle: "Append и Pop", 
                desc: "Метод append() добавляет элемент в конец списка. Метод pop() удаляет последний элемент (или по индексу).",
                code: "team = ['Sniper']\nteam.append('Spy')\nprint(team)\nteam.pop(0)\nprint(team)", out: "['Sniper', 'Spy']\n['Spy']" 
            },
            { 
                id: 11, title: "Длина len()", subtitle: "Размер данных", 
                desc: "Функция len() возвращает количество элементов в списке или количество символов в строке.",
                code: "msg = 'Critical Hit'\nitems = [10, 20, 30]\nprint(len(msg))\nprint(len(items))", out: "12\n3" 
            },
            { 
                id: 12, title: "Цикл For", subtitle: "Итерация", 
                desc: "Цикл for проходит по каждому элементу списка по очереди. Это самый частый способ обработки данных.",
                code: "for bot in ['Sentry', 'Dispenser']:\n    print(f'Building {bot}...')", out: "Building Sentry...\nBuilding Dispenser..." 
            },
            { 
                id: 13, title: "Функция range()", subtitle: "Счетчик", 
                desc: "range() создает последовательность чисел. Обычно используется в циклах for, чтобы повторить действие нужное количество раз.",
                code: "for i in range(3):\n    print(f'Загрузка... {i*33}%')", out: "Загрузка... 0%\nЗагрузка... 33%\nЗагрузка... 66%" 
            },
            { 
                id: 14, title: "Цикл While", subtitle: "До победного", 
                desc: "Цикл while работает до тех пор, пока условие истинно. Будь осторожен, чтобы не создать бесконечный цикл!",
                code: "fuel = 3\nwhile fuel > 0:\n    print(f'Топливо: {fuel}')\n    fuel -= 1", out: "Топливо: 3\nТопливо: 2\nТопливо: 1" 
            },
            { 
                id: 15, title: "Прерывание break", subtitle: "Экстренный выход", 
                desc: "Команда break мгновенно останавливает любой цикл, даже если условие еще выполняется.",
                code: "for n in range(100):\n    if n == 3:\n        break\n    print(n)", out: "0\n1\n2" 
            },
            { 
                id: 16, title: "Пропуск continue", subtitle: "Следующий шаг", 
                desc: "Команда continue пропускает текущую итерацию цикла и сразу переходит к следующей.",
                code: "for i in range(5):\n    if i == 2: continue\n    print(i)", out: "0\n1\n3\n4" 
            },
            { 
                id: 17, title: "Функции def", subtitle: "Свой инструмент", 
                desc: "Функции — это блоки кода, которые можно вызывать много раз. Они помогают не писать одно и то же.",
                code: "def say_hi():\n    print('System: Active')\nsay_hi()\nsay_hi()", out: "System: Active\nSystem: Active" 
            },
            { 
                id: 18, title: "Параметры функций", subtitle: "Входные данные", 
                desc: "В функцию можно передавать данные (аргументы). Это делает их гибкими.",
                code: "def attack(power):\n    print(f'Damage: {power * 2}')\nattack(10)\nattack(50)", out: "Damage: 20\nDamage: 100" 
            },
            { 
                id: 19, title: "Возврат return", subtitle: "Результат функции", 
                desc: "Функция может не просто печатать текст, а возвращать значение, которое можно сохранить в переменную.",
                code: "def get_sum(a, b):\n    return a + b\nres = get_sum(10, 20)\nprint(res)", out: "30" 
            },
            { 
                id: 20, title: "Словари (Dictionaries)", subtitle: "Ключи и значения", 
                desc: "Словари хранят данные парами. Вместо индекса (0, 1) мы используем ключ (имя). Пишутся в фигурных скобках.",
                code: "data = {'name': 'Heavy', 'hp': 300}\nprint(data['name'])\nprint(data['hp'])", out: "Heavy\n300" 
            },
            { 
                id: 21, title: "Методы словарей", subtitle: "Keys и Values", 
                desc: "Можно отдельно получить все ключи .keys() или все значения .values() из словаря.",
                code: "bot = {'id': 7, 'type': 'Sentry'}\nprint(bot.keys())", out: "dict_keys(['id', 'type'])" 
            },
            { 
                id: 22, title: "Кортежи (Tuples)", subtitle: "Неизменяемость", 
                desc: "Кортеж похож на список, но его нельзя изменить после создания. Пишется в круглых скобках.",
                code: "coords = (10, 20)\nprint(coords[1])", out: "20" 
            },
            { 
                id: 23, title: "Множества (Sets)", subtitle: "Уникальность", 
                desc: "Множество хранит только уникальные элементы. Дубликаты автоматически удаляются.",
                code: "s = {1, 2, 2, 3}\nprint(s)", out: "{1, 2, 3}" 
            },
            { 
                id: 24, title: "Срезы строк", subtitle: "Slicing", 
                desc: "Срезы позволяют вырезать часть строки. Формат: [старт : стоп : шаг].",
                code: "word = 'Python'\nprint(word[0:2])\nprint(word[::-1])", out: "Py\nnohtyP" 
            },
            { 
                id: 25, title: "Методы строк", subtitle: "Upper и Lower", 
                desc: "Строки можно делать заглавными .upper(), строчными .lower() или заменять символы .replace().",
                code: "text = 'python'\nprint(text.upper())\nprint(text.replace('p', 'J'))", out: "PYTHON\nJython" 
            },
            { 
                id: 26, title: "Импорт модулей", subtitle: "Библиотеки", 
                desc: "Импорт позволяет использовать чужой код. Модуль math содержит математические функции.",
                code: "import math\nprint(math.sqrt(16))\nprint(math.pi)", out: "4.0\n3.141592653589793" 
            },
            { 
                id: 27, title: "Рандом (Random)", subtitle: "Случайность", 
                desc: "Модуль random нужен для игр. randint(a, b) выдает целое число в диапазоне.",
                code: "import random\nprint(random.randint(1, 100))", out: "Случайное число (например 42)" 
            },
            { 
                id: 28, title: "Обработка ошибок", subtitle: "Try / Except", 
                desc: "Если код может вызвать ошибку (например, деление на ноль), оберни его в try/except, чтобы программа не вылетала.",
                code: "try:\n    res = 10 / 0\nexcept ZeroDivisionError:\n    print('Ошибка: деление на ноль!')", out: "Ошибка: деление на ноль!" 
            },
            { 
                id: 29, title: "Классы (ООП)", subtitle: "Чертежи объектов", 
                desc: "Класс — это шаблон для создания объектов. В нем описываются свойства и действия.",
                code: "class Player:\n    name = 'Noob'\n\np1 = Player()\nprint(p1.name)", out: "Noob" 
            },
            { 
                id: 30, title: "Мастер Python", subtitle: "Финал", 
                desc: "Поздравляем! Ты прошел 30 модулей. Ты изучил синтаксис, логику, циклы, функции и основы ООП. Теперь ты готов писать свои скрипты!",
                code: "print('Протокол завершен.')\nprint('Статус: Senior Python Developer Ready.')", out: "Протокол завершен.\nСтатус: Senior Python Developer Ready." 
            }
        ];

        let state = { currentLesson: 1, completed: JSON.parse(localStorage.getItem('py_v3_comp')) || [] };

        function init() {
            renderNav(); renderVideos(); loadLesson(state.currentLesson); updateProgress();
        }

        function renderNav() {
            const nav = document.getElementById('nav-list');
            nav.innerHTML = lessons.map(l => `
                <button class="nav-item ${state.currentLesson === l.id ? 'active' : ''} ${state.completed.includes(l.id) ? 'done' : ''}" 
                        id="ni-${l.id}" onclick="loadLesson(${l.id})">
                    <span class="nav-num">${l.id.toString().padStart(2, '0')}</span>
                    <span class="nav-name">${l.title}</span>
                    <span class="nav-check">✔</span>
                </button>
            `).join('');
        }

        function loadLesson(id) {
            state.currentLesson = id;
            const lesson = lessons.find(l => l.id === id);
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`ni-${id}`)?.classList.add('active');
            document.getElementById('head-title').innerText = `МОДУЛЬ ${id}: ${lesson.title}`;

            document.getElementById('lesson-content-area').innerHTML = `
                <h1 style="color:var(--voltage-yellow)">${lesson.title}</h1>
                <p style="color:var(--nitro-blue); margin-bottom:15px; font-weight:800;">// ${lesson.subtitle}</p>
                <div class="lesson-text">${lesson.desc}</div>
                <div class="ide-widget">
                    <div class="ide-header">
                        <span style="color:#555; font-size:11px; font-family:monospace;">main.py</span>
                        <button class="run-btn" onclick="runCode(${id}, this)">ВЫПОЛНИТЬ</button>
                    </div>
                    <div class="ide-body">${lesson.code}</div>
                    <div class="ide-terminal" id="term-${id}">
                        <div style="font-size:10px; color:#444; margin-bottom:5px;">TERMINAL OUTPUT</div>
                        <div><span class="term-prefix">>>></span> <span id="out-${id}"></span></div>
                    </div>
                </div>
                <button class="next-lesson-btn" onclick="completeStep(${id})">
                    ${id === lessons.length ? 'ЗАВЕРШИТЬ КУРС' : 'СЛЕДУЮЩИЙ ШАГ →'}
                </button>
            `;
            if(window.innerWidth < 900) toggleMobileNav();
        }

        function runCode(id, btn) {
            btn.innerText = "ЗАГРУЗКА...";
            setTimeout(() => {
                const term = document.getElementById(`term-${id}`);
                const out = document.getElementById(`out-${id}`);
                term.classList.add('active');
                out.innerText = lessons.find(l => l.id === id).out;
                btn.innerText = "ГОТОВО";
                showToast("Код успешно выполнен");
            }, 600);
        }

        function completeStep(id) {
            if(!state.completed.includes(id)) {
                state.completed.push(id);
                localStorage.setItem('py_v3_comp', JSON.stringify(state.completed));
                document.getElementById(`ni-${id}`).classList.add('done');
            }
            updateProgress();
            if(id < lessons.length) {
                loadLesson(id + 1);
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else {
                document.getElementById('finish-overlay').classList.add('active');
            }
        }

        function updateProgress() {
            const p = Math.round((state.completed.length / lessons.length) * 100);
            document.getElementById('p-fill').style.width = p + '%';
            document.getElementById('p-val').innerText = p + '%';
        }

        function renderVideos() {
            document.getElementById('video-grid-container').innerHTML = HARDCODED_VIDEOS.map(v => `
                <div class="video-card">
                    <div class="v-title">${v.title}</div>
                    <p style="font-size:12px; color:#555;">Лекция по теме модуля</p>
                    <button class="v-btn-watch" onclick="window.open('${v.url}', '_blank')">СМОТРЕТЬ</button>
                </div>
            `).join('');
        }

        function showToast(m) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast'; t.innerText = m;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        window.toggleMobileNav = () => document.getElementById('sidebar').classList.toggle('active');
        window.switchMainTab = (v, b) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
        };
        window.resetCourse = () => { localStorage.clear(); location.reload(); };

        init();
    </script>
</body>
</html>
